name: 🚀 CI/CD Pipeline (Build, Deploy & Release)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build Product
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🛠️ Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build project
        run: bun run build

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 1

  deploy:
    name: 🌐 Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist

      - name: ☁️ Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=oklch-scale-generator --branch=main

      - name: 🔗 Bind Custom Domain
        if: env.CUSTOM_DOMAIN != ''
        run: bunx wrangler pages domains add oklch-scale-generator $CUSTOM_DOMAIN
        env:
          CUSTOM_DOMAIN: ${{ secrets.CLOUDFLARE_CUSTOM_DOMAIN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    name: 🏷️ Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout code (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist

      - name: 🤐 Archive Build Products
        run: |
          cd dist
          zip -r ../oklch-scale-generator-build.zip .
          cd ..

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: oklch-scale-generator-build.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
